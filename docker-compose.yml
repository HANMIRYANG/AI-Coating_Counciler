# Local development PostgreSQL.
#
# Matches .env.example DATABASE_URL:
#   postgresql://postgres:postgres@localhost:5432/ai_coating_council?schema=public
#
# Usage:
#   docker compose up -d        # start in background
#   docker compose down         # stop (volume preserved)
#   docker compose down -v      # stop + DROP all data
#
# After the container is healthy:
#   cd apps/web
#   npx prisma migrate dev --name init_council
#   npx prisma generate
#
# To opt into Prisma persistence at runtime:
#   set SESSION_STORE=prisma in .env.local
#   (default remains in-memory so dev / mock flow stays untouched)

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-coating-council-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_coating_council
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_coating_council"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
